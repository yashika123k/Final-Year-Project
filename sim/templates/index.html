<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSN • Protocol Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0c12;
    --surface: #12151f;
    --surface-2: #1a1f2e;
    --border: #2a3142;
    --accent: #00f5d4;
    --accent2: #3b82f6;
    --leach: #00f5d4;
    --zcr: #22d3ee;
    --dead: #f87171;
    --energy: #a78bfa;
    --text: #e2e8f0;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --radius: 12px;
    --shadow: 0 10px 30px -10px rgba(0, 245, 212, 0.15);
    --glow: 0 0 20px rgba(0, 245, 212, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between; padding: 16px 32px;
    background: rgba(18, 21, 31, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 600;
    background: linear-gradient(90deg, #00f5d4, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo em { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-3); margin-left: 12px; font-style: normal; letter-spacing: 2px; }

  .header-status { display: flex; gap: 12px; }
  .stat-pill {
    background: var(--surface-2); border: 1px solid var(--border); padding: 6px 16px; border-radius: 9999px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; display: flex; align-items: center; gap: 8px;
  }
  .stat-pill .label { color: var(--text-3); }
  .stat-pill .val { color: var(--text); font-weight: 500; }

  /* PROTOCOL BAR */
  .protocol-bar {
    display: flex; align-items: center; padding: 14px 32px; background: var(--surface);
    border-bottom: 1px solid var(--border); gap: 16px;
  }
  .proto-label { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text-3); text-transform: uppercase; }
  .proto-btn {
    padding: 8px 24px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
    font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; border-radius: 9999px; cursor: pointer; transition: 0.3s;
  }
  .proto-btn.active-leach { background: rgba(0, 245, 212, 0.12); border-color: var(--leach); color: var(--leach); box-shadow: var(--glow); }
  .proto-btn.active-zcr { background: rgba(34, 211, 238, 0.12); border-color: var(--zcr); color: var(--zcr); box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); }

  .controls { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .ctrl-btn { padding: 8px 20px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; border-radius: 9999px; cursor: pointer; }
  .btn-start { background: linear-gradient(90deg, #00f5d4, #22d3ee); color: #0a0c12; font-weight: 600; border: none; }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 1fr 360px; height: calc(100vh - 118px); }
  .canvas-panel { position: relative; background: #0a0c12; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .canvas-header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; font-size: 0.75rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
  canvas#simCanvas { flex: 1; width: 100%; height: 100%; }

  /* RIGHT PANEL */
  .right-panel { background: var(--surface); display: flex; flex-direction: column; }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
  .metric-box { padding: 18px 20px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .metric-box:nth-child(even) { border-right: none; }
  .m-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-3); text-transform: uppercase; margin-bottom: 6px; }
  .m-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 600; }
  .m-val.dead { color: var(--dead); }

  .progress-wrap { padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 9999px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; background: var(--dead); transition: width 0.5s; }
  .alive-bar-fill { height: 100%; background: var(--accent); transition: width 0.5s; }

  .charts-section { flex: 1; overflow-y: auto; padding: 16px 24px; background: var(--surface-2); }
  .log-area { height: 110px; background: #0a0c12; border-top: 1px solid var(--border); padding: 12px 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.73rem; color: var(--text-2); overflow-y: auto; }

  .idle-msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 12, 18, 0.95); z-index: 10; }
  .finish-overlay { position: absolute; inset: 0; background: rgba(10, 12, 18, 0.96); backdrop-filter: blur(16px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .finish-overlay.show { display: flex; }
  .finish-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }

  .tooltip { position: absolute; background: rgba(18, 21, 31, 0.98); border: 1px solid var(--accent); padding: 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text); pointer-events: none; display: none; z-index: 1000; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">WSN Lab <em>PROTOCOL SIM</em></div>
  <div class="header-status">
    <div class="stat-pill"><span class="label">PROTOCOL</span><span class="val" id="hdr-proto">—</span></div>
    <div class="stat-pill"><span class="label">ROUND</span><span class="val" id="hdr-round">0</span></div>
    <div class="stat-pill"><span class="label">ALIVE</span><span class="val" id="hdr-alive">—</span></div>
  </div>
</header>

<div class="protocol-bar">
  <span class="proto-label">Select Protocol</span>
  <button class="proto-btn" id="btn-leach" onclick="selectProtocol('LEACH')">LEACH</button>
  <button class="proto-btn" id="btn-zcr" onclick="selectProtocol('ZCR')">ZCR</button>

  <div class="controls">
    <div style="display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-3);">
      <span>SPEED</span>
      <input type="range" id="speedSlider" min="1" max="10" value="4" oninput="updateSpeed(this.value)" style="width:90px;">
      <span id="speedLabel">4×</span>
    </div>
    <button class="ctrl-btn btn-start" id="btnStart" onclick="startSim()">▶ START SIMULATION</button>
    <button class="ctrl-btn" id="btnPause" onclick="togglePause()" disabled>⏸ PAUSE</button>
    <button class="ctrl-btn" onclick="resetSim()">RESET</button>
  </div>
</div>

<div class="main">
  <div class="canvas-panel">
    <div class="canvas-header">
      <span style="font-weight:500; color:var(--text);">Network Topology</span>
      <div style="display:flex; gap:16px;">
        <span><span style="color:#f59e0b">●</span> Cluster Head</span>
        <span><span style="color:#3b82f6">●</span> Member Node</span>
        <span><span style="color:#f87171">●</span> Dead</span>
      </div>
    </div>
    <canvas id="simCanvas"></canvas>
    <div class="idle-msg" id="idleMsg">
      <div style="font-family:'Space Grotesk'; font-size:3rem; opacity:0.1; font-weight:600;">WSN SIMULATOR</div>
      <p style="color:var(--text-3); font-size:0.9rem;">Choose protocol and start</p>
    </div>
    <div class="finish-overlay" id="finishOverlay">
      <div class="finish-card">
        <h2 style="color:var(--accent); font-family:'Space Grotesk';">Simulation Complete</h2>
        <div id="finishSub" style="color:var(--text-2); margin-top:15px; font-family:'JetBrains Mono'; line-height:1.6;"></div>
      </div>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="right-panel">
    <div class="metrics-grid">
      <div class="metric-box"><div class="m-label">Alive Nodes</div><div class="m-val" id="m-alive" style="color:#67e8f9;">—</div></div>
      <div class="metric-box"><div class="m-label">Dead Nodes</div><div class="m-val dead" id="m-dead">—</div></div>
      <div class="metric-box"><div class="m-label">Network Energy</div><div class="m-val" id="m-energy" style="color:var(--energy);">—</div></div>
      <div class="metric-box"><div class="m-label">Current Round</div><div class="m-val" id="m-round">0</div></div>
    </div>
    <div class="progress-wrap">
      <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-3); font-family:'JetBrains Mono';">
        <span>Network Lifetime</span><span id="alive-pct">100%</span>
      </div>
      <div class="progress-bar-bg"><div class="alive-bar-fill" id="aliveBar" style="width:100%"></div></div>
    </div>
    <div class="charts-section">
      <div style="margin-bottom:20px;">
        <p style="font-size:0.65rem; color:var(--text-3); font-family:'JetBrains Mono'; margin-bottom:8px;">ALIVE NODES</p>
        <canvas id="aliveChart" height="130"></canvas>
      </div>
      <div>
        <p style="font-size:0.65rem; color:var(--text-3); font-family:'JetBrains Mono'; margin-bottom:8px;">TOTAL ENERGY (J)</p>
        <canvas id="energyChart" height="130"></canvas>
      </div>
    </div>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<script>
// ── FULL LOGIC RESTORED ──
let selectedProtocol = null;
let simData = null;
let paused = false;
let simInterval = null;
let stepSpeed = 4;
let totalNodes = 100;
let areaW = 100, areaH = 100;
let baseStation = [50, 50];
let zoneRadius = 0; 

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight - 48;
}
window.addEventListener('resize', () => { resizeCanvas(); if (simData) drawFrame(simData); });
resizeCanvas();

function selectProtocol(name) {
  selectedProtocol = name;
  document.getElementById('btn-leach').className = 'proto-btn' + (name === 'LEACH' ? ' active-leach' : '');
  document.getElementById('btn-zcr').className = 'proto-btn' + (name === 'ZCR' ? ' active-zcr' : '');
  document.getElementById('hdr-proto').textContent = name;
  log(`Protocol selected: <b>${name}</b>`);
}

function updateSpeed(v) {
  stepSpeed = parseInt(v);
  document.getElementById('speedLabel').textContent = v + '×';
  if (simInterval) { clearInterval(simInterval); startLoop(); }
}

function log(msg) {
  const area = document.getElementById('logArea');
  const ts = new Date().toTimeString().slice(0, 8);
  area.innerHTML += `<div><span style="color:#64748b">[${ts}]</span> ${msg}</div>`;
  area.scrollTop = area.scrollHeight;
}

// ── CHARTS CONFIG ──
const commonOpts = {
  animation: false,
  plugins: { legend: { display: false } },
  scales: { 
    x: { grid: { color: '#1e2937' }, ticks: { font: { size: 9 } } },
    y: { grid: { color: '#1e2937' }, ticks: { font: { size: 9 } } }
  }
};

const aliveChart = new Chart(document.getElementById('aliveChart'), {
  type: 'line',
  data: { labels: [], datasets: [{ data: [], borderColor: '#67e8f9', tension: 0.4, borderWidth: 2, pointRadius: 0 }] },
  options: commonOpts
});

const energyChart = new Chart(document.getElementById('energyChart'), {
  type: 'line',
  data: { labels: [], datasets: [{ data: [], borderColor: '#a78bfa', tension: 0.4, borderWidth: 2, pointRadius: 0 }] },
  options: commonOpts
});

// ── DRAWING LOGIC ──
function toCanvasX(mx) { return (mx / areaW) * canvas.width; }
function toCanvasY(my) { return (my / areaH) * canvas.height; }

function drawFrame(data) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bsX = toCanvasX(baseStation[0]);
  const bsY = toCanvasY(baseStation[1]);

  // Draw Zone Circle for ZCR
  if (selectedProtocol === 'ZCR' && zoneRadius > 0) {
    ctx.beginPath();
    ctx.arc(bsX, bsY, (zoneRadius / areaW) * canvas.width, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(34, 211, 238, 0.2)';
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const nodes = data.nodes || [];
  
  // 1. Draw Links
  nodes.forEach(n => {
    if (!n.alive) return;
    let targetNode = null;
    if (n.target !== null && n.target !== undefined) {
        targetNode = nodes[n.target];
    }

    ctx.beginPath();
    ctx.moveTo(toCanvasX(n.x), toCanvasY(n.y));
    
    if (targetNode) {
      ctx.lineTo(toCanvasX(targetNode.x), toCanvasY(targetNode.y));
      ctx.strokeStyle = n.is_ch ? 'rgba(245, 158, 11, 0.4)' : 'rgba(59, 130, 246, 0.2)';
    } else if (n.is_ch) {
      ctx.lineTo(bsX, bsY);
      ctx.strokeStyle = 'rgba(245, 158, 11, 0.6)';
    }
    ctx.stroke();
  });

  // 2. Draw Nodes
  nodes.forEach(n => {
    const x = toCanvasX(n.x), y = toCanvasY(n.y);
    ctx.beginPath();
    ctx.arc(x, y, n.is_ch ? 5 : 3, 0, Math.PI * 2);
    if (!n.alive) ctx.fillStyle = '#f87171';
    else if (n.is_ch) ctx.fillStyle = '#f59e0b';
    else ctx.fillStyle = '#3b82f6';
    ctx.fill();
  });

  // 3. Draw Base Station
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(bsX-6, bsY-6, 12, 12);
}

// ── SIMULATION ENGINE ──
async function startSim() {
  if (!selectedProtocol) return log("Please select a protocol.");
  document.getElementById('idleMsg').style.display = 'none';
  document.getElementById('finishOverlay').classList.remove('show');
  
  const res = await fetch('/api/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ protocol: selectedProtocol })
  });
  const init = await res.json();
  simData = init;
  totalNodes = init.total_nodes;
  areaW = init.width; areaH = init.height;
  baseStation = init.base_station;
  zoneRadius = init.zone_radius || 0;
  
  paused = false;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnPause').textContent = "⏸ PAUSE";
  log(`Simulation Started: ${selectedProtocol}`);
  startLoop();
}

function startLoop() {
  clearInterval(simInterval);
  simInterval = setInterval(tick, Math.max(40, 280 / stepSpeed));
}

async function tick() {
  if (paused) return;
  const res = await fetch('/api/step', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ steps: 1 })
  });
  const data = await res.json();
  simData = data;
  
  updateUI(data);
  drawFrame(data);

  if (data.finished) {
    clearInterval(simInterval);
    document.getElementById('finishOverlay').classList.add('show');
    document.getElementById('finishSub').innerHTML = `
      Protocol: ${data.protocol}<br>
      Total Rounds: ${data.round}<br>
      Nodes Alive: ${data.alive}
    `;
  }
}

function updateUI(data) {
  document.getElementById('m-alive').textContent = data.alive;
  document.getElementById('m-dead').textContent = totalNodes - data.alive;
  document.getElementById('m-energy').textContent = data.total_energy.toFixed(2) + " J";
  document.getElementById('m-round').textContent = data.round;
  document.getElementById('hdr-round').textContent = data.round;
  document.getElementById('hdr-alive').textContent = data.alive;

  const alivePct = (data.alive / totalNodes) * 100;
  document.getElementById('aliveBar').style.width = alivePct + "%";
  document.getElementById('alive-pct').textContent = Math.round(alivePct) + "%";

  // Update Charts
  if (data.alive_history) {
    const labels = data.alive_history.map((_, i) => i);
    aliveChart.data.labels = labels;
    aliveChart.data.datasets[0].data = data.alive_history;
    aliveChart.update('none');

    energyChart.data.labels = labels;
    energyChart.data.datasets[0].data = data.energy_history;
    energyChart.update('none');
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? "▶ RESUME" : "⏸ PAUSE";
}

async function resetSim() {
  clearInterval(simInterval);
  await fetch('/api/reset', { method: 'POST' });
  location.reload();
}

// ── TOOLTIP ──
canvas.addEventListener('mousemove', (e) => {
  if (!simData || !simData.nodes) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / canvas.width * areaW;
  const my = (e.clientY - rect.top) / canvas.height * areaH;

  let closest = null, minDist = 5;
  simData.nodes.forEach(n => {
    const d = Math.hypot(n.x - mx, n.y - my);
    if (d < minDist) { minDist = d; closest = n; }
  });

  const tip = document.getElementById('tooltip');
  if (closest) {
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 15) + 'px';
    tip.style.top = (e.clientY + 15) + 'px';
    tip.innerHTML = `Node #${closest.id}<br>Energy: ${closest.energy.toFixed(4)}J<br>Type: ${closest.is_ch ? 'CH' : 'Member'}`;
  } else tip.style.display = 'none';
});

</script>
</body>
</html>
